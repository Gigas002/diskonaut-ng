# Example diskonaut config. Copy to:
#   ~/.config/diskonaut/config.toml
# or pass: diskonaut -c /path/to/config.toml

version = 1

[base]
# Use logical file size instead of on-disk block usage (same as `-a` / `--apparent-size`).
apparent-size = false

[keybinds]
# Single-character keys, special names (enter, escape, left, …), or modifiers (ctrl+c).
# Arrow keys and Ctrl+f/b/n/p remain available for movement unless you remap the vim keys below.

quit = "q"
delete = "d"
move-left = "h"
move-right = "l"
move-up = "k"
move-down = "j"
enter = "enter"
parent = "escape"
zoom-in = "+"
zoom-out = "-"
reset-zoom = "0"
confirm = "y"
cancel = "n"
